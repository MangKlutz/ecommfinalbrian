<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueTaste - Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="images/truetastelogo.png" alt="TrueTaste Logo" class="logo-img">
        </div>
        <nav class="nav-links">
            <a href="products.html">Products</a>
            <a href="whatsnew.html">What's New</a>
            <a href="faq.html">FAQs</a>
        </nav>
        <div class="nav-actions">
            <a href="cart.html" class="cart-link">
                <svg class="cart-icon-svg" xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span id="cart-counter">0</span>
            </a>
            <input type="text" placeholder="Value" class="search-bar">
            <button class="btn-logout" onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <main class="cart-layout">
        <section class="cart-items-section">
            <h2>Shopping Cart</h2>
            <div class="cart-items-list">
                
                <div class="cart-item">
                    <img src="images/beyondburgercart.png" alt="Beyond Burger" class="item-img">
                    <div class="item-details"><p class="item-name">Beyond Burger Plant-based Patties</p></div>
                    <div class="item-quantity">
                        <button class="btn-qty decrease" onclick="updateQuantity(this, -1)">-</button>
                        <span class="qty-value">1</span>
                        <button class="btn-qty increase" onclick="updateQuantity(this, 1)">+</button>
                    </div>
                    <div class="item-price" data-price="350.50">₱350.50</div>
                    <button class="btn-delete" onclick="deleteItem(this)">Delete</button>
                </div>

                <div class="cart-item">
                    <img src="images/popcornchicken.png" alt="Popcorn Chicken" class="item-img">
                    <div class="item-details"><p class="item-name">Good & Gather Popcorn Chicken</p></div>
                    <div class="item-quantity">
                        <button class="btn-qty decrease" onclick="updateQuantity(this, -1)">-</button>
                        <span class="qty-value">1</span>
                        <button class="btn-qty increase" onclick="updateQuantity(this, 1)">+</button>
                    </div>
                    <div class="item-price" data-price="205.39">₱205.39</div>
                    <button class="btn-delete" onclick="deleteItem(this)">Delete</button>
                </div>

                <div class="cart-item">
                    <img src="images/cerebelly.png" alt="Cerebelly" class="item-img">
                    <div class="item-details">
                        <p class="item-name">Cerebelly Organic Baby Food</p>
                        <span class="item-subtext">Carrot Pumpkin</span>
                    </div>
                    <div class="item-quantity">
                        <button class="btn-qty decrease" onclick="updateQuantity(this, -1)">-</button>
                        <span class="qty-value">1</span>
                        <button class="btn-qty increase" onclick="updateQuantity(this, 1)">+</button>
                    </div>
                    <div class="item-price" data-price="400.00">₱400.00</div>
                    <button class="btn-delete" onclick="deleteItem(this)">Delete</button>
                </div>
            </div>
        </section>

        <aside class="order-details-section">
            <h2>Order Details</h2>
            <div class="summary-row"><span>Subtotal</span><h3 id="display-subtotal">₱955.89</h3></div>
            
            <div class="shipping-box">
                <span>Shipping</span>
                <select id="shippingMethod" onchange="updateShipping()">
                    <option value="80">Ninja Van (₱80)</option>
                    <option value="120">J&T Express (₱120)</option>
                    <option value="0">Store Pickup (₱0)</option>
                </select>
            </div>

            <div class="promo-box">
                <span>Promo Code</span>
                <input type="text" id="promoCode" placeholder="Enter promo code here">
            </div>
            <div class="summary-row total-row"><span>Total Cost</span><h2 id="display-totalCost">₱1035.89</h2></div>
            <button class="btn-checkout" onclick="handleCheckout()">CHECKOUT</button>
        </aside>
    </main>

    <footer class="footer">
        <p><strong>Freshness You Trust</strong></p>
        <div class="social-icons">
            <img src="images/sociallinks.png" alt="Social Links" height="20">
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
